# EXP-11 Job A: 16 Workers / 64 L40S GPUs on the VLM-wl01 queue.
# Copied from job_exp10_scale16.yaml; only entrypoint differs.

type: jexp10-scale64
business: VLM-wl01
subBusiness: mm-general
image: registry-wl01.vivo.lan/romai_dev/images/llava_train:vivolm-ngc-25.10-2604091110
dataPaths:
- /data/vjuicefs_sz_ocr_wl/public_data
- /data/vjuicefs_ai_ocr_wl/public_data
- /data/vjuicefs_ai_gpt_vision_wl04/public_data
- /data/vjuicefs_ai_gpt_nlp/public_data
tmpfs: true
restartPolicy: Never

run:
  rdma: 'ib'
  command: "EXP11_RUN_ID=unset EXP11_ATTEMPT_ID=unset EXP11_RESUME=0 EXP11_ARMS=exp11_frozen_sft_s0,exp11_mask15_s0,exp11_orca_noquery_s0,exp11_orca_obs_s0 EXP11_NODES_PER_ARM=6 EXP11_GRAD_ACCUM=1 EXP11_NUM_WORKERS=3 EXP11_MAX_STEPS=4000 EXP11_SAVE_EVERY=250 bash /data/vjuicefs_sz_ocr_wl/public_data/11193960/jepa-vlm-single-tower/scripts/cluster/job_exp11_orca24_entry.sh"

spec:
  Worker:
    num: 24
    nodes:
      vivo.com/machine-type: 'L40s'
    limits:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
    requests:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
