# EXP-11 Job B: 8 Workers / 32 L40S GPUs on the VideoFoundationModel1b-wl01 queue.
# Two arms, each a 4-node / 16-GPU DDP group with grad-accum 2:
#   exp11_orca_noquery_s0   +   exp11_orca_obs_s0
# Effective batch = 4 samples/GPU * 16 GPUs * grad-accum 2 = 128/update.
# Trains both arms to 4000 updates, then rank0 evaluates both on MVBench + TempCompass.

type: jexp11-orca-b
business: VideoFoundationModel1b-wl01
subBusiness: mm-general
image: registry-wl01.vivo.lan/romai_dev/images/llava_train:vivolm-ngc-25.10-2604091110
dataPaths:
- /data/vjuicefs_sz_ocr_wl/public_data
- /data/vjuicefs_ai_ocr_wl/public_data
- /data/vjuicefs_ai_gpt_vision_wl04/public_data
- /data/vjuicefs_ai_gpt_nlp/public_data
tmpfs: true
restartPolicy: Never

run:
  rdma: 'ib'
  command: "EXP11_RUN_ID=unset EXP11_ATTEMPT_ID=unset EXP11_RESUME=0 EXP11_ARMS=exp11_orca_noquery_s0,exp11_orca_obs_s0 EXP11_NODES_PER_ARM=4 EXP11_GRAD_ACCUM=2 EXP11_NUM_WORKERS=2 EXP11_MAX_STEPS=4000 EXP11_SAVE_EVERY=250 bash /data/vjuicefs_sz_ocr_wl/public_data/11193960/jepa-vlm-single-tower/scripts/cluster/job_exp11_orca24_entry.sh"

spec:
  Worker:
    num: 8
    nodes:
      vivo.com/machine-type: 'L40s'
    limits:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
    requests:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
