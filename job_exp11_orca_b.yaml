# EXP-11 Job B: 8 Workers / 32 L40S GPUs on the VideoFoundationModel1b-wl01 queue.
# One arm, an 8-node / 32-GPU DDP group with grad-accum 1:
#   exp11_orca_noquery_s0   (query ablation of the Orca arm run in Job A)
# Effective batch = 4 samples/GPU * 32 GPUs * grad-accum 1 = 128/update.
# Trains the arm to 4000 updates, then rank0 evaluates it on MVBench + TempCompass.

type: jexp11-orca-b
business: VideoFoundationModel1b-wl01
image: registry-wl01.vivo.lan/romai_dev/images/llava_train:vivolm-ngc-25.10-2604091110
dataPaths:
- /data/vjuicefs_sz_ocr_wl/public_data
- /data/vjuicefs_ai_ocr_wl/public_data
- /data/vjuicefs_ai_gpt_vision_wl04/public_data
- /data/vjuicefs_ai_gpt_nlp/public_data
tmpfs: true
restartPolicy: Never

run:
  rdma: 'ib'
  command: "EXP11_RUN_ID=unset EXP11_ATTEMPT_ID=unset EXP11_RESUME=0 EXP11_ARMS=exp11_orca_noquery_s0 EXP11_NODES_PER_ARM=8 EXP11_GRAD_ACCUM=1 EXP11_NUM_WORKERS=1 EXP11_MAX_STEPS=4000 EXP11_SAVE_EVERY=250 bash /data/vjuicefs_sz_ocr_wl/public_data/11193960/jepa-vlm-single-tower/scripts/cluster/job_exp11_orca24_entry.sh"

spec:
  Worker:
    num: 8
    nodes:
      vivo.com/machine-type: 'L40s'
    limits:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
    requests:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
