# EXP-10 64-GPU job: four independent 4-node DDP groups, one group per arm.
#
# Resources: 16 Workers x 4 L40S = 64 GPUs.  Each arm uses 4 nodes / 16 GPUs
# with batch_size=4 and GRAD_ACCUM=2, preserving the baseline effective batch:
#   4 samples/GPU * 16 GPUs * 2 accumulation = 128 samples/update.
#
# This is the mid-tier fallback between the 128-GPU scale job (32 Workers) and
# the 16-GPU conservative job (4 Workers).  The entrypoint runs data gates and
# smoke first, trains the four arms in parallel, runs the integrated evaluation,
# then exits.  restartPolicy: Never lets vivolm release all Worker pods once
# evaluation completes.

type: jexp10-scale64
business: VLM-wl01
subBusiness: mm-general
image: registry-wl01.vivo.lan/romai_dev/images/llava_train:vivolm-ngc-25.10-2604091110
dataPaths:
- /data/vjuicefs_sz_ocr_wl/public_data
- /data/vjuicefs_ai_ocr_wl/public_data
- /data/vjuicefs_ai_gpt_vision_wl04/public_data
# Rank-0 final eval reads MVBench + TempCompass media from here.
- /data/vjuicefs_ai_gpt_nlp/public_data
tmpfs: true
restartPolicy: Never

run:
  rdma: 'ib'
  command: "EXP10_RUN_ID=unset EXP10_ATTEMPT_ID=unset EXP10_RESUME=0 EXP10_NODES_PER_ARM=4 EXP10_GRAD_ACCUM=2 EXP10_NUM_WORKERS=2 EXP10_SAVE_EVERY=250 bash /data/vjuicefs_sz_ocr_wl/public_data/11193960/jepa-vlm-single-tower/scripts/cluster/job_exp10_scale_entry.sh"

spec:
  Worker:
    num: 16
    nodes:
      vivo.com/machine-type: 'L40s'
    limits:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
    requests:
      gpu: "4"
      cpu: "120"
      memory: "990Gi"
